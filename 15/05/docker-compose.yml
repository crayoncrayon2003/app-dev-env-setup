version: "3"
services:
  nginx1:
    image: nginx
    ports:
      - "8081:80"
    command: >
      sh -c "echo '<h1> I am nginx-1 </h1>' > /usr/share/nginx/html/index.html
      && nginx -g 'daemon off;'"

  nginx2:
    image: nginx
    ports:
      - "8082:80"
    command: >
      sh -c "echo '<h1> I am nginx-2 </h1>' > /usr/share/nginx/html/index.html
      && nginx -g 'daemon off;'"
